<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneFarm</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Signika+Negative:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <img src="icon.png" alt="OneFarm Icon" width="16" height="16" style="border-radius:3px; object-fit:contain; flex-shrink:0;">
                <span>OneFarm</span>
            </div>
            <div class="window-actions">
                <button id="btn-refresh-devices" class="icon-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.0"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
                <div class="win-controls">
                    <div class="win-btn" id="win-min">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.0"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </div>
                    <div class="win-btn" id="win-max">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.0"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
                    </div>
                    <div class="win-btn close" id="win-close">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.0"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-content">
             <main id="device-list" class="device-list">
                <div style="text-align: center; padding: 48px 24px; color: var(--text-secondary); font-size: 0.8rem; line-height: 1.5; border: 2px dashed var(--border-color); border-radius: 8px; margin: 16px; background: var(--secondary-color);">
                    Hệ thống đã sẵn sàng. Vui lòng nhấn nút Làm mới (Refresh) ở góc trên bên phải để quét thiết bị.
                </div>
            </main>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/console.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/buy_seeds_modal.js"></script>
    <script src="js/handlers.js"></script>
    <script src="js/devices.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
